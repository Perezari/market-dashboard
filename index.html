<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b1311">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockPulse">
<title>StockPulse · Terminal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<!--
  index.html הוא כעת stub בלבד. כל ה-login+dashboard ממוזגים לתוך dashboard.html כ-overlay.
  המעבר הזה שומר על מצב PWA standalone (אין יותר ניווט בין דפים שעלול לפרק את standalone).
  אם מישהו הגיע לכאן (דרך bookmark ישן או ה-URL הראשי) — מפנים מיד לדשבורד.
-->
<script>
  // Preserves hash/query if any, then bounces to dashboard
  location.replace('dashboard.html' + location.search + location.hash);
</script>
<style>
html,body{margin:0;padding:0;background:#0b1311;color:#e8e6e3;font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.fallback{text-align:center;padding:20px;font-size:14px;color:#8a8f87;letter-spacing:.3px}
.fallback a{color:#4fc78a;text-decoration:none;font-weight:700}
.fallback a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="fallback">
  מעביר לדשבורד... אם לא עובר אוטומטית, <a href="dashboard.html">לחץ כאן</a>.
</div>
</body>
</html>
