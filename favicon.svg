<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square, Perplexity dark bg -->
  <rect width="32" height="32" rx="7" fill="#1e1d1c"/>
  <!-- Subtle inner glow border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#4e99a3" stroke-width=".8" opacity=".4"/>
  <!-- Trending up line (same as header logo) -->
  <polyline
    points="26,10 18,17.5 13,12.5 6,19.5"
    fill="none" stroke="#4e99a3" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow corner (top-right) -->
  <polyline
    points="21,10 26,10 26,15"
    fill="none" stroke="#4e99a3" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
